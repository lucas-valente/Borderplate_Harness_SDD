name: Template - Node Module E2E Suite

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "api/**"
      - "API/**"
      - "backend/**"
      - "server/**"
      - "services/**"
      - ".github/workflows/api-e2e-suite.yml"
  push:
    branches:
      - develop
    paths:
      - "api/**"
      - "API/**"
      - "backend/**"
      - "server/**"
      - "services/**"
      - ".github/workflows/api-e2e-suite.yml"

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install and run e2e tests
        shell: bash
        run: |
          MODULE_PATH=""
          for CANDIDATE in api API backend server services service; do
            if [ -f "$CANDIDATE/package.json" ]; then
              MODULE_PATH="$CANDIDATE"
              break
            fi
          done

          if [ -z "$MODULE_PATH" ]; then
            echo "No Node service module found. Skipping e2e suite template."
            exit 0
          fi

          cd "$MODULE_PATH"
          npm ci

          if npm run | grep -q "test:e2e"; then
            npm run test:e2e
            exit 0
          fi

          if npm run | grep -q "test:smoke"; then
            npm run test:smoke
            exit 0
          fi

          if [ -f "jest.e2e.config.js" ]; then
            npx jest --config jest.e2e.config.js --runInBand
            exit 0
          fi

          echo "No e2e test command/config found. Update this workflow template for your stack."
          exit 1
