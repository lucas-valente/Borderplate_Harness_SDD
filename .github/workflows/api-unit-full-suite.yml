name: Template - Node Module Unit Suite

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "api/**"
      - "API/**"
      - "backend/**"
      - "server/**"
      - "services/**"
      - ".github/workflows/api-unit-full-suite.yml"
  push:
    branches:
      - develop
    paths:
      - "api/**"
      - "API/**"
      - "backend/**"
      - "server/**"
      - "services/**"
      - ".github/workflows/api-unit-full-suite.yml"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install and run unit tests
        shell: bash
        run: |
          MODULE_PATH=""
          for CANDIDATE in api API backend server services service; do
            if [ -f "$CANDIDATE/package.json" ]; then
              MODULE_PATH="$CANDIDATE"
              break
            fi
          done

          if [ -z "$MODULE_PATH" ]; then
            echo "No Node service module found. Skipping unit suite template."
            exit 0
          fi

          cd "$MODULE_PATH"
          npm ci

          if npm run | grep -q "test:unit"; then
            npm run test:unit
            exit 0
          fi

          if npm run | grep -q "test"; then
            npm run test -- --runInBand
            exit 0
          fi

          if [ -f "jest.unit.config.js" ]; then
            npx jest --config jest.unit.config.js --runInBand
            exit 0
          fi

          echo "No unit test command/config found. Update this workflow template for your stack."
          exit 1
