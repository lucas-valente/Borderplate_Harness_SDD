name: Semgrep Security Scan

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - develop
      - staging
      - main

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (OWASP Top 10 baseline)
        run: semgrep --config=p/owasp-top-ten --error --exclude node_modules .
